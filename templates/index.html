<!DOCTYPE html>
<html>
<head>
    <title>TechStore AI</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">

</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">TechStore AI</a>
  </div>
</nav>

<!-- HERO -->
<div class="container py-5 text-center">
    <h1 class="fw-bold">AI Product Recommendation System</h1>
    <p class="text-muted">Find similar tech products instantly using machine learning</p>

    <!-- SEARCH BOX -->
    <form action="/recommend" method="POST" class="d-flex justify-content-center mt-4"
      onsubmit="showLoading()">
        <input list="productsList" type="text" name="product_name"
       class="form-control w-50 me-2"
       placeholder="Search e.g. Gaming Mouse..." required>

        <datalist id="productsList">
            {% for p in products %}
            <option value="{{ p }}"></option>
            {% endfor %}
        </datalist>
        <button class="btn btn-primary">Search</button>
    </form>
</div>

<!-- FEATURED PRODUCTS -->
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Featured Products</h3>
        <span class="text-muted">AI-curated selection</span>
    </div>

    <div class="row g-3">

        {% for item in featured %}
        <div class="col-md-3 col-sm-6">
            <div class="card border-0 shadow-sm h-100 product-card">

                <div class="card border-0 shadow-sm h-100">

    <img src="{{ item.image }}" class="card-img-top" style="height:160px; object-fit:cover;">

    <div class="card-body">
        <h6 class="fw-bold">{{ item.product_name }}</h6>
        <p class="text-muted small">{{ item.category }}</p>
        <span class="fw-bold text-success">${{ item.price }}</span>
    </div>

</div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>

<script>
function showLoading() {
    document.getElementById("loading").style.display = "block";
}
</script>
